name: Keep Backend Alive
on:
  schedule:
    - cron: '*/10 * * * *' # Cada 10 minutos para evitar que Render se apague (límite 15 min)
  workflow_dispatch: # Permite ejecución manual desde GitHub Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend
        run: |
          curl -I https://ccdt-back.onrender.com/api/webhooks/cron/health-check
